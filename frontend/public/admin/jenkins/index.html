<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard [Jenkins]</title>
  <meta name="ROBOTS" content="INDEX,NOFOLLOW" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #0077c8; /* Jenkins blue */
      --primary-hover: #005a96;
      --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      --glass-bg: rgba(255, 255, 255, 0.05);
      --glass-border: rgba(255, 255, 255, 0.1);
      --text-main: #f8fafc;
      --text-muted: #94a3b8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-gradient);
      color: var(--text-main);
      overflow: hidden;
    }

    /* Animated background elements */
    .bg-circle {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      z-index: 0;
      animation: float 20s infinite ease-in-out;
    }

    .circle-1 {
      width: 400px;
      height: 400px;
      background: rgba(0, 119, 200, 0.15);
      top: -100px;
      left: -100px;
    }

    .circle-2 {
      width: 500px;
      height: 500px;
      background: rgba(139, 92, 246, 0.1);
      bottom: -150px;
      right: -100px;
      animation-delay: -5s;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(30px, 50px); }
    }

    /* Login Container */
    .login-wrapper {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 420px;
      padding: 40px;
      background: var(--glass-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .header-icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 20px;
      background: rgba(255,255,255,0.1);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      border: 1px solid var(--glass-border);
    }

    .title {
      font-size: 24px;
      font-weight: 600;
      margin-bottom: 8px;
      letter-spacing: -0.5px;
    }

    .subtitle {
      font-size: 14px;
      color: var(--text-muted);
    }

    .form-group {
      margin-bottom: 24px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 8px;
      color: var(--text-muted);
      transition: color 0.3s ease;
    }

    .form-input {
      width: 100%;
      padding: 14px 16px;
      background: rgba(0, 0, 0, 0.2);
      border: 1px solid var(--glass-border);
      border-radius: 12px;
      color: white;
      font-size: 15px;
      transition: all 0.3s ease;
      outline: none;
    }

    .form-input:focus {
      background: rgba(0, 0, 0, 0.3);
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(0, 119, 200, 0.15);
    }

    .form-input:focus + .form-label {
      color: var(--primary);
    }

    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }

    .submit-btn:hover {
      background: var(--primary-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px var(--primary);
    }

    .submit-btn:active {
      transform: translateY(0);
    }

    .footer {
      margin-top: 30px;
      text-align: center;
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .footer a {
      color: var(--primary);
      text-decoration: none;
      transition: opacity 0.3s;
    }
    
    .footer a:hover {
      opacity: 0.8;
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="bg-circle circle-1"></div>
  <div class="bg-circle circle-2"></div>

  <div class="login-wrapper">
    <div class="header">
      <div class="header-icon">🛡️</div>
      <h1 class="title">Jenkins CI/CD</h1>
      <p class="subtitle">Please sign in to access the dashboard</p>
    </div>

    <form onsubmit="event.preventDefault(); alert('Authentication required to access /admin/jenkins/manage');">
      <div class="form-group">
        <label class="form-label" for="j_username">Username</label>
        <input class="form-input" type="text" id="j_username" name="j_username" placeholder="admin" required autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label" for="j_password">Password</label>
        <input class="form-input" type="password" id="j_password" name="j_password" placeholder="••••••••" required autocomplete="current-password" />
      </div>

      <button type="submit" class="submit-btn">Secure Sign In</button>
    </form>

    <div class="footer">
      <p>Jenkins ver. 2.414.2 &middot; <a href="#">Forgot Password?</a></p>
    </div>
  </div>
</body>
</html>
